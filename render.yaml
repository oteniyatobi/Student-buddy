databases:
  - name: student-buddy-db
    plan: free
    databaseName: studentbuddy

services:
  - type: web
    name: student-buddy-server
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-buddy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
